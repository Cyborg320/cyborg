<!DOCTYPE html>
<html>
<head>
    <title>Planilha Fazenda</title>
    <script>
        // Load saved data from localStorage when the page loads
        window.onload = function() {
            loadSavedData();
        };

        // Function to load saved data
        function loadSavedData() {
            const savedData = localStorage.getItem('planilhaData');
            if (savedData) {
                const data = JSON.parse(savedData);
                // Populate your inputs with saved data here
                document.getElementById('saldoFinal').value = data.saldoFinal;
                // Add other elements as needed
            }
        }

        // Auto-save data on every input change
        function autoSave() {
            const saldoFinal = document.getElementById('saldoFinal').value;
            const dataToSave = { saldoFinal: saldoFinal }; // Add other fields to save
            localStorage.setItem('planilhaData', JSON.stringify(dataToSave));
        }

        // Event listeners for auto-save
        document.getElementById('saldoFinal').addEventListener('input', autoSave);
        // Add more event listeners as needed

        // Function to finalize the day
        function finalizarDia() {
            const saldoFinal = document.getElementById('saldoFinal').value;
            const caixaInicial = document.getElementById('caixaInicial');

            caixaInicial.value = parseFloat(caixaInicial.value) + parseFloat(saldoFinal);
            // Clear all product inputs and retirada
            clearInputs();
            // Save changes
            autoSave();
        }

        // Function to clear inputs
        function clearInputs() {
            // Clear your inputs here
            document.getElementById('saldoFinal').value = '';
            // Clear other fields as needed
        }
    </script>
</head>
<body>
    <h1>Planilha Fazenda</h1>
    <label for="saldoFinal">Saldo Final:</label>
    <input type="text" id="saldoFinal" />
    <br />
    <label for="caixaInicial">Caixa Inicial:</label>
    <input type="text" id="caixaInicial" />
    <br />
    <button onclick="finalizarDia()">Finalizar Dia</button>
</body>
</html>
